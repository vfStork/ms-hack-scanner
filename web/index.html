<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Digital Twin Scanner</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: system-ui, -apple-system, sans-serif; display: flex; height: 100vh; background: #0f1117; color: #e0e0e0; }

    /* Sidebar */
    #sidebar { width: 280px; background: #1a1d27; border-right: 1px solid #2a2d3a; display: flex; flex-direction: column; overflow: hidden; }
    #sidebar h2 { padding: 16px; font-size: 14px; text-transform: uppercase; letter-spacing: 1px; color: #8b8fa3; border-bottom: 1px solid #2a2d3a; }
    #twin-list { flex: 1; overflow-y: auto; padding: 8px; }
    .twin-item { padding: 10px 12px; border-radius: 6px; cursor: pointer; margin-bottom: 4px; font-size: 13px; }
    .twin-item:hover { background: #252836; }
    .twin-item.active { background: #2d5a9e; }
    .twin-item .twin-name { font-weight: 600; }
    .twin-item .twin-meta { font-size: 11px; color: #8b8fa3; margin-top: 2px; }

    /* Main area */
    #main { flex: 1; display: flex; flex-direction: column; }

    /* Toolbar */
    #toolbar { display: flex; gap: 8px; padding: 12px 16px; background: #1a1d27; border-bottom: 1px solid #2a2d3a; align-items: center; flex-wrap: wrap; }
    button { padding: 8px 16px; border: 1px solid #3a3d4a; border-radius: 6px; background: #252836; color: #e0e0e0; cursor: pointer; font-size: 13px; }
    button:hover { background: #353848; }
    button.primary { background: #2d5a9e; border-color: #2d5a9e; }
    button.primary:hover { background: #3a6dbf; }
    button:disabled { opacity: 0.4; cursor: not-allowed; }
    #toolbar .spacer { flex: 1; }
    select { padding: 8px 12px; border: 1px solid #3a3d4a; border-radius: 6px; background: #252836; color: #e0e0e0; font-size: 13px; }

    /* 3D viewport */
    #viewport-container { flex: 1; position: relative; display: flex; }
    #viewport { flex: 1; }
    #viewport-b { flex: 1; display: none; border-left: 2px solid #2d5a9e; }

    /* Info panel */
    #info-panel { width: 320px; background: #1a1d27; border-left: 1px solid #2a2d3a; overflow-y: auto; display: none; }
    #info-panel.visible { display: block; }
    #info-panel h3 { padding: 12px 16px; font-size: 13px; text-transform: uppercase; letter-spacing: 1px; color: #8b8fa3; border-bottom: 1px solid #2a2d3a; }
    .info-section { padding: 12px 16px; border-bottom: 1px solid #2a2d3a; }
    .info-section label { display: block; font-size: 11px; color: #8b8fa3; margin-bottom: 4px; text-transform: uppercase; }
    .info-section .value { font-size: 13px; line-height: 1.5; }
    .changelog-entry { padding: 10px 16px; border-bottom: 1px solid #2a2d3a; font-size: 12px; line-height: 1.5; }
    .changelog-entry .ts { color: #8b8fa3; font-size: 11px; }

    /* Status bar */
    #status { padding: 6px 16px; font-size: 12px; color: #8b8fa3; background: #13151c; border-top: 1px solid #2a2d3a; }

    /* File input hidden */
    #file-input { display: none; }

    /* Loading overlay */
    #loading { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.6); z-index: 999; justify-content: center; align-items: center; font-size: 18px; }
    #loading.active { display: flex; }
  </style>
</head>
<body>

  <div id="sidebar">
    <h2>Digital Twins</h2>
    <div id="twin-list"></div>
  </div>

  <div id="main">
    <div id="toolbar">
      <button id="btn-upload" class="primary">Upload Scan</button>
      <button id="btn-clean" disabled>Clean</button>
      <button id="btn-enrich" disabled>Enrich (AI)</button>
      <button id="btn-compare" disabled>Compare</button>
      <div class="spacer"></div>
      <select id="version-select" disabled><option>Version</option></select>
      <select id="variant-select">
        <option value="raw">Raw</option>
        <option value="clean">Cleaned</option>
      </select>
      <button id="btn-info" title="Toggle info panel">ℹ</button>
    </div>

    <div id="viewport-container">
      <canvas id="viewport"></canvas>
      <canvas id="viewport-b"></canvas>
    </div>

    <div id="status">Ready — upload a .ply scan to begin</div>
  </div>

  <div id="info-panel">
    <h3>Twin Details</h3>
    <div id="metadata-section" class="info-section">
      <label>Metadata</label>
      <div class="value" id="metadata-content">—</div>
    </div>
    <h3>Changelog</h3>
    <div id="changelog-section"></div>
  </div>

  <input type="file" id="file-input" accept=".ply,.obj,.stl" />
  <div id="loading"><span>Processing…</span></div>

  <script type="importmap">
  {
    "imports": {
      "three": "https://cdn.jsdelivr.net/npm/three@0.170.0/build/three.module.js",
      "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.170.0/examples/jsm/"
    }
  }
  </script>
  <script type="module" src="viewer.js"></script>
  <script type="module" src="app.js"></script>
</body>
</html>
